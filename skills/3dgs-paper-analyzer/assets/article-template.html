<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root { --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --accent:#1d4ed8; --bg:#ffffff; --code:#f8fafc; --ok:#166534; --warn:#92400e; --bad:#991b1b; --soft:#f8fafc; }
    body { margin:0 auto; max-width: 920px; padding: 32px 20px; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif; line-height: 1.75; }
    h1 { font-size: 2rem; line-height: 1.25; margin: 0 0 1.2rem; }
    h2 { margin-top: 2.2rem; padding-bottom: .3rem; border-bottom: 1px solid var(--border); color: var(--accent); }
    h3 { margin-top: 1.5rem; }
    .toc { border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; margin: 1.5rem 0 2rem; background: #f9fafb; }
    .toc ul { margin: .5rem 0 0; padding-left: 1.25rem; }
    .toc-level-3 { margin-left: 1rem; }
    .table-scroll { overflow-x: auto; margin: 1rem 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: .95rem; }
    th, td { border: 1px solid var(--border); padding: .5rem .65rem; vertical-align: top; }
    th { background: #f9fafb; }
    code { background: var(--code); padding: .12rem .3rem; border-radius: 4px; }
    pre { background: var(--code); border: 1px solid var(--border); padding: 1rem; overflow-x: auto; border-radius: 6px; }
    blockquote { margin: 1rem 0; border-left: 4px solid var(--border); padding-left: 1rem; color: var(--muted); }
    img { max-width: 100%; }
    details { border: 1px solid var(--border); border-radius: 8px; padding: .75rem 1rem; background: var(--soft); margin: 1rem 0; }
    summary { cursor: pointer; font-weight: 650; }
    .mode-standard h2 { color: #1d4ed8; }
    .mode-innovation h2 { color: #7c3aed; }
    .quick-judgment, .claim-card, .repro-card, .result-card { border: 1px solid var(--border); border-radius: 8px; padding: 1rem; background: #fff; }
    .support-direct, .support-partial, .support-indirect, .support-none, .support-conflict,
    .priority-p0, .priority-p1, .priority-p2,
    .depth-preliminary, .depth-deep,
    .severity-minor, .severity-moderate, .severity-major, .severity-unclear {
      display: inline-block; border-radius: 999px; padding: .12rem .5rem; font-size: .85rem; font-weight: 650;
    }
    .support-direct, .depth-deep, .priority-p0, .severity-minor { background:#dcfce7; color:var(--ok); }
    .support-partial, .support-indirect, .depth-preliminary, .priority-p1, .severity-moderate, .severity-unclear { background:#fef3c7; color:var(--warn); }
    .support-none, .support-conflict, .priority-p2, .severity-major { background:#fee2e2; color:var(--bad); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script>mermaid.initialize({startOnLoad:true, theme:"default"});</script>
</head>
<body>
{{CONTENT}}
</body>
</html>
