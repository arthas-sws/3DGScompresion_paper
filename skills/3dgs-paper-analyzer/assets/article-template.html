<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root { --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --accent:#1d4ed8; --bg:#ffffff; --code:#f8fafc; }
    body { margin:0 auto; max-width: 920px; padding: 32px 20px; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif; line-height: 1.75; }
    h1 { font-size: 2rem; line-height: 1.25; margin: 0 0 1.2rem; }
    h2 { margin-top: 2.2rem; padding-bottom: .3rem; border-bottom: 1px solid var(--border); color: var(--accent); }
    h3 { margin-top: 1.5rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: .95rem; }
    th, td { border: 1px solid var(--border); padding: .5rem .65rem; vertical-align: top; }
    th { background: #f9fafb; }
    code { background: var(--code); padding: .12rem .3rem; border-radius: 4px; }
    pre { background: var(--code); border: 1px solid var(--border); padding: 1rem; overflow-x: auto; border-radius: 6px; }
    blockquote { margin: 1rem 0; border-left: 4px solid var(--border); padding-left: 1rem; color: var(--muted); }
    img { max-width: 100%; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad:true, theme:"default"});</script>
</head>
<body>
{{CONTENT}}
</body>
</html>
